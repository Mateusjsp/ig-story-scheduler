name: Postar Story diário

on:
  schedule:
    # 09:00 BRT = 12:00 UTC. Ajuste se quiser outro horário.
    - cron: "0 12 * * *"
  workflow_dispatch: {}  # permite rodar manualmente pela aba Actions

permissions:
  contents: write  # necessário pra commitar o state.json atualizado

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Publicar próximo Story
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: python -m src.main

      - name: Salvar estado atualizado
        run: |
          if ! git diff --quiet state.json; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "chore: avança fila de stories [skip ci]"
            git push
          fi
